name: Generate Daily DSE Wrap

on:
  schedule:
    # Runs at 14:00 UTC (5 PM East Africa Time) every Mon-Fri
    - cron: '0 14 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jinja2

      - name: Generate Daily Wrap
        run: python generate_daily_wrap.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Amana Capital Automation"
          git config --global user.email "bot@amana-capital-ea.co.tz"
          git add .
          # Only commit if there are changes
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "Automated Daily Wrap Update"
            # Using GH_PAT secret to bypass default token limits on Actions retriggering Pages
            git push https://${{ secrets.GH_PAT }}@github.com/tmalundi7-jpg/amana-capital-ea.git main
          fi
