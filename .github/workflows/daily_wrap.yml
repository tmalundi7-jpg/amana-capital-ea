name: Daily Wrap Automation

on:
  push:
    paths:
      - 'data/daily_data.json'
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '14:00 * * 1-5' # 5:00 PM EAT, Weekdays

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install jinja2

      - name: Generate Daily Update
        run: python generate_daily_update.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "automation@amana-capital-ea.co.tz"
          git config --local user.name "Amana Automation Bot"
          git add .
          git commit -m "Auto-generate market update for date +'%Y-%m-%d'" || echo "No changes to commit"
          git push origin main
