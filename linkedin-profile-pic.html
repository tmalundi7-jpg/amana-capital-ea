<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LinkedIn Profile Pic</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background-color: #f0f0f0;
        }
        .linkedin-pic-canvas {
            width: 400px; height: 400px;
            background-color: #0B1D3A;
            display: flex; justify-content: center; align-items: center;
        }
        .brand-icon {
            width: 260px; /* roughly 65% of 400px */
            height: auto;
            color: #C8962E; /* Gold */
        }
    </style>
</head>
<body>
    <div class="linkedin-pic-canvas">
        <svg viewBox="0 0 32 44" class="brand-icon" aria-hidden="true">
            <path d="M0,44 L13,0 L19,0 L6,44Z" fill="currentColor"/>
            <rect x="21" y="0" width="8" height="44" fill="currentColor"/>
            <rect x="0" y="19" width="21" height="4" fill="currentColor"/>
        </svg>
    </div>
    <script src="/js/theme-toggle.js"></script>
</body>
</html>
